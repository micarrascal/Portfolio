<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Isabel Carrascal</title>
    <script>
      // GitHub Pages SPA redirect: forwards 404s back to index.html
      // preserving the intended path so React Router can handle it.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/' +
        '?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
